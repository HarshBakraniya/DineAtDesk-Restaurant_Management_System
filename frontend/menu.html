<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu · DineAtDesk</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      fontFamily: { display: ['Poppins','sans-serif'], sans: ['Inter','sans-serif'], mono: ['JetBrains Mono','monospace'] },
      colors: { ink: '#1F2937', cream: '#FAF7F1', amber: { DEFAULT: '#B45309', dark: '#92400E' } }
    }}
  }
</script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-cream">
  <div class="flex">
    <div id="sidebar-mount"></div>

    <main class="flex-1 p-8 max-w-6xl h-screen overflow-y-auto">
      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="font-display font-bold text-2xl text-ink">Menu</h1>
          <p class="text-slate-500 text-sm mt-1">Toggle availability instantly. Full edits open the form.</p>
        </div>
        <button id="add-btn" onclick="openForm()" class="hidden bg-amber hover:bg-amber-dark text-white text-sm font-semibold px-4 py-2.5 rounded-lg">
          + Add item
        </button>
      </div>

      <div id="menu-list" class="space-y-8">
        <p class="text-slate-400 text-sm">Loading…</p>
      </div>
    </main>
  </div>

  <!-- Add/edit form modal -->
  <div id="form-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-40 p-4">
    <div class="bg-white rounded-xl w-full max-w-md p-6">
      <h3 id="form-title" class="font-display font-semibold text-lg text-ink mb-4">Add menu item</h3>
      <form id="item-form" class="space-y-4">
        <input type="hidden" id="item-id">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Name</label>
          <input id="item-name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 focus:outline-none">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Price (₹)</label>
            <input id="item-price" type="number" step="0.01" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Category</label>
            <select id="item-category" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 focus:outline-none"></select>
          </div>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button" onclick="closeForm()" class="text-sm font-semibold text-slate-500 px-4 py-2">Cancel</button>
          <button type="submit" class="bg-amber hover:bg-amber-dark text-white text-sm font-semibold px-5 py-2 rounded-lg">Save</button>
        </div>
      </form>
    </div>
  </div>

<script src="js/common.js"></script>
<script>
let currentUser = null;
let categories = [];

function canEdit() {
  return currentUser && ['admin', 'manager'].includes(currentUser.role);
}

async function loadMenu() {
  try {
    const [items, cats] = await Promise.all([apiFetch('/menu.php'), apiFetch('/menu.php?categories=1')]);
    categories = cats;

    const grouped = {};
    items.forEach(item => {
      grouped[item.category_name] = grouped[item.category_name] || [];
      grouped[item.category_name].push(item);
    });

    const list = document.getElementById('menu-list');
    list.innerHTML = Object.entries(grouped).map(([catName, catItems]) => `
      <div>
        <h2 class="font-display font-semibold text-ink text-base mb-3 pb-2 border-b border-gray-200">${catName}</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          ${catItems.map(renderItem).join('')}
        </div>
      </div>
    `).join('');
  } catch (e) { toast(e.message, 'error'); }
}

function renderItem(item) {
  const editable = canEdit();
  return `
    <div class="ticket-card p-4 flex items-center justify-between ${item.is_available ? '' : 'opacity-50'}">
      <div class="${editable ? 'cursor-pointer' : ''}" ${editable ? `onclick="openForm(${item.id})"` : ''}>
        <p class="font-medium text-ink text-sm">${item.name}</p>
        <p class="text-xs text-slate-500 font-mono-tag mt-0.5">${formatMoney(item.price)}</p>
      </div>
      <label class="relative inline-flex items-center cursor-pointer">
        <input type="checkbox" class="sr-only peer" ${item.is_available ? 'checked' : ''} onchange="toggleAvailability(${item.id})">
        <div class="w-10 h-5 bg-gray-300 peer-checked:bg-green-600 rounded-full transition-colors"></div>
        <div class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
      </label>
    </div>
  `;
}

async function toggleAvailability(id) {
  try {
    await apiFetch(`/menu.php?id=${id}&toggle=1`, { method: 'PUT' });
    toast('Availability updated');
    loadMenu();
  } catch (e) { toast(e.message, 'error'); }
}

function populateCategorySelect() {
  const sel = document.getElementById('item-category');
  sel.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

async function openForm(id = null) {
  populateCategorySelect();
  document.getElementById('item-form').reset();
  document.getElementById('item-id').value = '';

  if (id) {
    document.getElementById('form-title').textContent = 'Edit menu item';
    const items = await apiFetch('/menu.php');
    const item = items.find(i => i.id === id);
    document.getElementById('item-id').value = item.id;
    document.getElementById('item-name').value = item.name;
    document.getElementById('item-price').value = item.price;
    document.getElementById('item-category').value = item.category_id;
  } else {
    document.getElementById('form-title').textContent = 'Add menu item';
  }

  document.getElementById('form-modal').classList.remove('hidden');
  document.getElementById('form-modal').classList.add('flex');
}

function closeForm() {
  document.getElementById('form-modal').classList.add('hidden');
  document.getElementById('form-modal').classList.remove('flex');
}

document.getElementById('item-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('item-id').value;
  const payload = {
    name: document.getElementById('item-name').value.trim(),
    price: parseFloat(document.getElementById('item-price').value),
    category_id: parseInt(document.getElementById('item-category').value),
  };

  try {
    if (id) {
      await apiFetch(`/menu.php?id=${id}`, { method: 'PUT', body: JSON.stringify(payload) });
      toast('Item updated');
    } else {
      await apiFetch('/menu.php', { method: 'POST', body: JSON.stringify(payload) });
      toast('Item added');
    }
    closeForm();
    loadMenu();
  } catch (e) { toast(e.message, 'error'); }
});

(async function init() {
  currentUser = await requireAuth();
  if (canEdit()) document.getElementById('add-btn').classList.remove('hidden');
  loadMenu();
})();
</script>
</body>
</html>
