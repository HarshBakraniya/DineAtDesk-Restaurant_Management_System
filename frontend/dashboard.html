<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · DineAtDesk</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      fontFamily: { display: ['Poppins','sans-serif'], sans: ['Inter','sans-serif'], mono: ['JetBrains Mono','monospace'] },
      colors: { ink: '#1F2937', cream: '#FAF7F1', amber: { DEFAULT: '#B45309', dark: '#92400E' } }
    }}
  }
</script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-cream">
  <div class="flex flex-col lg:flex-row min-h-screen">
    <div id="sidebar-mount"></div>

    <main class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto w-full">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
        <div>
          <h1 class="font-display font-bold text-2xl text-ink">Today's Floor</h1>
          <p class="text-slate-500 text-sm mt-1" id="today-date"></p>
        </div>
      </div>

      <!-- Stat cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
        <div class="ticket-card p-5">
          <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Free tables</p>
          <p id="stat-free" class="font-display font-bold text-3xl text-green-700 mt-2">—</p>
        </div>
        <div class="ticket-card p-5">
          <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Occupied tables</p>
          <p id="stat-occupied" class="font-display font-bold text-3xl text-amber-700 mt-2">—</p>
        </div>
        <div class="ticket-card p-5">
          <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Active orders</p>
          <p id="stat-orders" class="font-display font-bold text-3xl text-blue-700 mt-2">—</p>
        </div>
        <div class="ticket-card p-5">
          <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Revenue today</p>
          <p id="stat-revenue" class="font-display font-bold text-3xl text-ink mt-2">—</p>
        </div>
      </div>

      <!-- Active orders preview -->
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-display font-semibold text-lg text-ink">Live Orders</h2>
        <a href="orders.html" class="text-amber-700 text-sm font-semibold hover:underline">View all →</a>
      </div>
      <div id="orders-preview" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <p class="text-slate-400 text-sm">Loading…</p>
      </div>

      <div id="admin-reset-zone" class="hidden mt-10 p-5 border-2 border-red-200 bg-red-50 rounded-xl">
        <p class="font-display font-semibold text-red-700 mb-1">Danger zone</p>
        <p class="text-sm text-red-600 mb-3">Permanently deletes all orders, order items, and bills — revenue resets to zero. Menu, tables, and staff accounts are kept.</p>
        <button onclick="resetSystemData()" class="bg-red-600 hover:bg-red-700 text-white text-sm font-semibold px-4 py-2 rounded-lg">
          Clear all order & revenue data
        </button>
      </div>
    </main>
  </div>

<script src="js/common.js"></script>
<script>
(async function init() {

  let currentUser;
  currentUser = await requireAuth();
  
  if (currentUser.role === 'admin') {
    document.getElementById('admin-reset-zone').classList.remove('hidden');
  }

  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-IN', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  try {
    const [tables, orders, bills] = await Promise.all([
      apiFetch('/tables.php'),
      apiFetch('/orders.php'),
      apiFetch('/bills.php'),
    ]);

    const free = tables.filter(t => t.status === 'free').length;
    const occupied = tables.filter(t => t.status === 'occupied').length;
    const active = orders.filter(o => ['pending','preparing','served'].includes(o.status));

    const today = new Date().toDateString();
    const revenueToday = bills
      .filter(b => b.is_paid && new Date(b.created_at.replace(' ', 'T')).toDateString() === today)
      .reduce((sum, b) => sum + Number(b.total), 0);

    document.getElementById('stat-free').textContent = free;
    document.getElementById('stat-occupied').textContent = occupied;
    document.getElementById('stat-orders').textContent = active.length;
    document.getElementById('stat-revenue').textContent = formatMoney(revenueToday);

    const preview = document.getElementById('orders-preview');
    if (active.length === 0) {
      preview.innerHTML = `<p class="text-slate-400 text-sm">No active orders right now.</p>`;
    } else {
      preview.innerHTML = active.slice(0, 6).map(o => `
        <div class="ticket-card p-4 status-${o.status}">
          <div class="flex items-center justify-between mb-1">
            <span class="font-mono-tag text-xs text-slate-500">#${o.id}</span>
            <span class="text-xs font-semibold capitalize px-2 py-0.5 rounded-full bg-gray-100 text-slate-600">${o.status}</span>
          </div>
          <p class="font-semibold text-ink">Table ${o.table_number}</p>
          <p class="text-xs text-slate-500 mt-1">${o.waiter_name} · ${timeAgo(o.created_at)}</p>
        </div>
      `).join('');
    }
  } catch (e) {
    toast(e.message, 'error');
  }
})();

async function resetSystemData() {
  const confirmText = prompt('Type RESET to permanently clear all order and revenue data:');
  if (confirmText !== 'RESET') return;
  try {
    await apiFetch('/admin.php?action=reset_data', { method: 'POST' });
    toast('System data cleared');
    location.reload();
  } catch (e) { toast(e.message, 'error'); }
}

</script>
</body>
</html>
